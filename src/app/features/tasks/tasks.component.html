<div class="app">
  <div class="header">
    <h1>Task Manager</h1>
    <div class="stats">
      <p>Total de tâches : {{ taskService.tasksCount() }}</p>
      <p>Total de tâches terminées : {{ taskService.completedTasksCount() }}</p>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" [style.width.%]="taskService.completionPercentage()"></div>
    </div>
  </div>

  <app-task-form />

  <div class="filters">
    <input
      type="text"
      placeholder="Rechercher une tâche..."
      (keyup)="taskService._$searchFilter.set($event.target.value.trim())"
    />
    <div class="filter-buttons">
      @for (item of completionStatus; track $index) {
        <button
          (click)="changeStatusFilter(item)"
          [class.active]="taskService._$completionFilter() === item"
        >
          {{ item }}
        </button>
      }
    </div>
  </div>

  <ul class="task-list">
    @for (task of taskService._$filteredTasks(); track task.id) {
      <app-task-item [task]="task" />
    } @empty {
      <p>Aucune tâche trouvée.</p>
    }
  </ul>
</div>
