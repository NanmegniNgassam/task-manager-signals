<div class="app">
  <div class="header">
    <h1>Task Manager</h1>
    <div class="stats">
      <p>Total de tâches : {{ taskService.tasksCount() }}</p>
      <p>Total de tâches terminées : {{ taskService.completedTasksCount() }}</p>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" [style.width.%]="taskService.completionPercentage()"></div>
    </div>
  </div>

  <app-task-form />

  <ul class="task-list">
    @for (task of taskService.$tasks(); track task.id) {
      <app-task-item [task]="task" />
    } @empty {
      <p>Vous avez terminé toutes vos cartes.</p>
      <p>Il est temps de remplir votre check-list!</p>
    }
  </ul>
</div>
